# Companion Detection: DLL Side-Loading Behavior

title: Suspicious DLL Side-Loading from Browser-Downloaded Payload
id: soc338-dll-sideload-behavior
description: |
  Detects suspicious DLL side-loading behavior when a trusted binary loads
  DLLs from an untrusted location following browser download activity.

logsource:
  category: process_creation
  product: endpoint_security
  platform: windows

detection:
  side_loading:
    - parent_image|endswith: 'chrome.exe'
    - image|contains:
        - '\\ClickFix'
        - '\\windows-update.site'
        - '\\Update'
    - loaded_dll|contains:
        - 'd3dcompiler_47.dll'
        - 'mfc140u.dll'
        - 'api-ms-win'
    - process_command_line|contains:
        - 'ClickFix'
        - 'update'
        - 'repair'
  condition: side_loading

falsepositives:
  - Legitimate software update installers
  - Known browser extension loaders

action:
  - immediate:
      - terminate_process
      - isolate_device
      - quarantine_dll
      - log_process_tree
  - followup:
      - memory_dump
      - persistence_check
      - network_connection_analysis
      - user_credential_review
