title: Click Fix Phishing with DLL Side-Loading
id: soc338-clickfix-dll-sideload
description: |
  Detects phishing attacks using Click Fix / Windows Update-style lures
  followed by DLL side-loading and Lumma Stealer execution.

  Attack pattern:
  - Fake update/fix web page
  - Malicious domain `windows-update.site`
  - Browser access from legitimate process
  - DLL side-loading into a trusted loader
  - Credential theft malware execution

author: SOC Analyst
date: 2026/06/18
modified: 2026/06/18
status: experimental
severity: high

logsource:
  category: web_security
  product: letsdefend

detection:
  selection:
    - url|contains: 'windows-update.site'
    - referrer|contains: 'mail.letsdefend.io'
    - process_name|contains: 'chrome.exe'
    - http_status: '200'
  condition: selection

falsepositives:
  - Legitimate update domains
  - Internal patching systems with similar referrers

action:
  - immediate:
      - quarantine_device
      - block_url
      - alert_security_team
      - collect_forensics
  - followup:
      - credential_reset
      - threat_hunt
      - IOC_enrichment

