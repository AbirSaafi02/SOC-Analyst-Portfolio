title: Phishing Email with Password-Protected Malicious Attachment (SOC282 Pattern)
id: soc282-phishing-password-protected-archive
description: |
  Detects phishing emails containing password-protected ZIP archives with executable files.
  Based on LetsDefend SOC282 case - "free-coffee.zip" with backdoor payload.
  
  Attack Pattern:
  - Email with social engineering theme (free offer, limited time)
  - Password-protected ZIP attachment
  - Executable file inside archive
  - Threat actor goal: Bypass email gateway scanning

author: SOC Analyst
date: 2024/06/17
modified: 2024/06/17
status: experimental
severity: critical

logsource:
  category: email_security
  product: letsdefend

detection:
  email_properties:
    # Suspicious email metadata
    - authentication_status: 
        - DKIM: fail
        - SPF: fail
        - DMARC: fail
    
    # Social engineering keywords
    - subject|contains|all:
        - 'free'
        - 'voucher'
        - 'offer'
        - 'limited'
        - 'click'
        - 'urgent'
    
    # Sender reputation
    - sender_domain: 
        - is_newly_registered: true
        - reputation: malicious
    
  attachment_properties:
    # Password-protected archive indicators
    - filename|endswith: '.zip'
    - file_type: 'application/x-zip-compressed'
    - is_password_protected: true
    - archive_contains_executable: true
    
    # Malicious content inside
    - archive_files|contains:
        - '.exe'
        - '.com'
        - '.scr'
        - '.vbs'
        - '.ps1'
    
    # Suspicious naming patterns
    - filename|contains:
        - 'free-'
        - 'invoice'
        - 'receipt'
        - 'document'
        - 'update'
  
  file_reputation:
    # Known malicious hashes
    - file_hash_md5|contains|all: 'coffee.exe'
    - virustotal_detection_ratio: '> 50'
    - virustotal_verdict: 'malicious'
    - threat_type:
        - 'backdoor'
        - 'trojan'
        - 'rat'
  
  delivery_status:
    # Email successfully delivered (worst case)
    - device_action: 'allowed'
    - user_received: true

  # Combine conditions: Email + Archive + Reputation
  selection: |
    (email_properties AND attachment_properties AND (file_reputation OR delivery_status))

filter:
  # Reduce false positives
  - legitimate_archive_sender: false
  - whitelisted_domain: false
  - corporate_authorized_distribution: false

condition: selection

falsepositives:
  - Legitimate password-protected archives from known vendors (rare)
  - Corporate file distribution with executable updates
  - Internal tools with password-protected deployment

action:
  - immediate: 
      - flag_email_as_phishing
      - quarantine_attachment
      - delete_from_user_inbox
      - alert_security_team
  
  - followup:
      - check_endpoint_for_execution
      - monitor_user_device
      - isolate_if_executed
      - credential_reset

