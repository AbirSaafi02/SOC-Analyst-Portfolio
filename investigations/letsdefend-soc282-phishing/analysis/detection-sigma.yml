# Hunt Query: SIEM / Log Aggregation

# Splunk Query
```splunk
index=email_security 
| search attachment_name="free-coffee.zip" OR (attachment_type="zip" AND is_password_protected=true AND archive_contains_executable=true)
| stats count by src_user, src_ip, attachment_name, virustotal_detection_ratio
| search virustotal_detection_ratio > 50
| join type=left src_user 
  [ search index=endpoint process_name="Coffee.exe" OR process_path="*Downloads*" parent_process="explorer.exe"
    | stats latest(process_name) as executed_file, latest(_time) as execution_time by src_user
  ]
| table src_user, src_ip, attachment_name, executed_file, execution_time, virustotal_detection_ratio
| where execution_time != null
```

# Elasticsearch/ELK Query
```json
{
  "query": {
    "bool": {
      "must": [
        {
          "term": {
            "email.attachment.is_password_protected": true
          }
        },
        {
          "regexp": {
            "email.attachment.name": ".*\\.zip$"
          }
        },
        {
          "range": {
            "virustotal.detection_ratio": {
              "gte": 50
            }
          }
        }
      ]
    }
  },
  "aggs": {
    "by_user": {
      "terms": {
        "field": "email.recipient.user",
        "size": 100
      }
    }
  }
}
```

