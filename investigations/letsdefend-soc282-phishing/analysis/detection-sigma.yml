# Companion Detection: Endpoint Execution (Process-Based)

title: Suspicious Executable Execution from Downloads Folder After Phishing Email
id: soc282-phishing-execution-endpoint
description: |
  Detects execution of suspicious executable from user Downloads folder,
  correlating with phishing email alert.
  
  Behavioral pattern:
  - User receives phishing email
  - User extracts password-protected ZIP archive
  - User double-clicks executable from Downloads
  - Process spawned from file extraction location

author: SOC Analyst
date: 2024/06/17
status: experimental
severity: critical

logsource:
  category: process_creation
  product: endpoint_security
  platform: windows

detection:
  process_location:
    - image|contains:
        - 'Downloads'
        - 'Temp'
        - 'AppData\\Local\\Temp'
    
    - parent_image|contains:
        - 'explorer.exe'
        - 'winrar.exe'
        - '7z.exe'
  
  process_name:
    - image|endswith: '.exe'
    - image|contains:
        - 'coffee'
        - 'invoice'
        - 'document'
        - 'update'
    
    # Avoid common safe executables
    - image|excludes:
        - 'chrome.exe'
        - 'firefox.exe'
        - 'outlook.exe'
  
  process_behavior:
    # Suspicious process activity post-execution
    - command_line|contains|any:
        - 'cmd.exe'
        - 'powershell.exe'
        - 'whoami'
        - 'ipconfig'
      
    - network_connection: true
    - registry_modification: true
  
  correlation:
    # Link to email alert if available
    - related_email_alert: phishing_detected
    - time_delta: '< 10 minutes'

condition: process_location AND process_name AND (process_behavior OR correlation)

falsepositives:
  - Legitimate software installers from Downloads
  - User intentionally running downloaded tools

action:
  - immediate:
      - terminate_process
      - isolate_device
      - quarantine_executable
      - log_full_process_chain
  
  - followup:
      - memory_dump_analysis
      - registry_persistence_check
      - network_connections_analysis
      - scheduled_task_check

